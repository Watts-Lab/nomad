<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="580" viewBox="0 0 1600 580" role="img" aria-labelledby="title desc">
  <title id="title">ST-DBSCAN flow diagram</title>
  <desc id="desc">TA-DBSCAN style ST-DBSCAN diagram with all text wrapped inside boxes.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4.5 L0,9 z" fill="#0e1013"/>
    </marker>
    <style>
      .bg { fill: #ececef; }
      .top { fill: #2f8b80; }

      .title { font: 700 64px 'Segoe UI', Arial, sans-serif; fill: #0f141b; }
      .subtitle { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #273342; }

      .label { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #101821; }
      .text { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #1d2a38; }
      .tiny { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #28486b; }

      .whitebox { fill: #f8f9fc; stroke: #1e1f21; stroke-width: 2.5; }
      .yellow { fill: #efe3a8; stroke: #1a1f24; stroke-width: 2.6; }
      .green { fill: #a8ddb1; stroke: #1a1f24; stroke-width: 2.6; }

      .edge { stroke: #2b2b2b; stroke-width: 3.1; }
      .arrow { stroke: #0e1013; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .split { stroke: #234263; stroke-width: 3; stroke-dasharray: 7 6; }

      .dot { fill: #e89eaa; stroke: #334e68; stroke-width: 2; }
      .core { fill: #dd7c8f; stroke: #25405a; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="580"/>
  <rect class="top" x="0" y="0" width="1600" height="20"/>

  <text class="title" x="62" y="100">ST-DBSCAN</text>

  <!-- Left graph: eps_spatial neighbors -->
  <g transform="translate(82,194)">
    <line class="edge" x1="38" y1="58" x2="92" y2="30"/>
    <line class="edge" x1="38" y1="58" x2="48" y2="116"/>
    <line class="edge" x1="92" y1="30" x2="144" y2="58"/>
    <line class="edge" x1="48" y1="116" x2="110" y2="122"/>
    <line class="edge" x1="66" y1="84" x2="120" y2="86"/>
    <line class="edge" x1="110" y1="122" x2="144" y2="58"/>
    <line class="edge" x1="66" y1="84" x2="48" y2="116"/>
    <line class="edge" x1="66" y1="84" x2="92" y2="30"/>
    <circle class="dot" cx="38" cy="58" r="10"/>
    <circle class="dot" cx="92" cy="30" r="10"/>
    <circle class="dot" cx="144" cy="58" r="10"/>
    <circle class="dot" cx="48" cy="116" r="10"/>
    <circle class="dot" cx="110" cy="122" r="10"/>
    <circle class="dot" cx="66" cy="84" r="10"/>
  </g>

  <rect class="whitebox" x="246" y="232" width="190" height="96" rx="12" ry="12"/>
  <text class="label" x="341" y="273" text-anchor="middle">
    <tspan x="341">Graph of</tspan>
    <tspan x="341" dy="34">eps_spatial-N(p)</tspan>
  </text>

  <!-- remove edges step -->
  <line class="arrow" x1="442" y1="280" x2="520" y2="280"/>
  <rect class="yellow" x="448" y="146" width="164" height="58" rx="10" ry="10"/>
  <text class="tiny" x="530" y="170" text-anchor="middle">
    <tspan x="532">REMOVE EDGES</tspan>
    <tspan x="532" dy="18">delta_t &gt; T_max</tspan>
  </text>

  <!-- filtered graph -->
  <g transform="translate(532,194)">
    <line class="edge" x1="34" y1="62" x2="88" y2="34"/>
    <line class="edge" x1="88" y1="34" x2="140" y2="62"/>
    <line class="edge" x1="52" y1="116" x2="114" y2="122"/>
    <line class="edge" x1="66" y1="86" x2="120" y2="88"/>
    <line class="edge" x1="114" y1="122" x2="140" y2="62"/>
    <circle class="dot" cx="34" cy="62" r="10"/>
    <circle class="dot" cx="88" cy="34" r="10"/>
    <circle class="dot" cx="140" cy="62" r="10"/>
    <circle class="dot" cx="52" cy="116" r="10"/>
    <circle class="dot" cx="114" cy="122" r="10"/>
    <circle class="core" cx="66" cy="86" r="10"/>
  </g>

  <rect class="whitebox" x="690" y="232" width="230" height="96" rx="12" ry="12"/>
  <text class="label" x="805" y="273" text-anchor="middle">
    <tspan x="805">Temporal-filtered</tspan>
    <tspan x="805" dy="34">reachability graph</tspan>
  </text>

  <!-- DBSCAN core block -->
  <line class="arrow" x1="926" y1="280" x2="986" y2="280"/>

  <rect class="yellow" x="996" y="238" width="124" height="48" rx="12" ry="12"/>
  <text class="label" x="1058" y="268" text-anchor="middle">DBSCAN</text>

  <rect class="whitebox" x="1130" y="232" width="230" height="96" rx="12" ry="12"/>
  <text class="label" x="1245" y="264" text-anchor="middle">
    <tspan x="1245">CC(core, minPts)</tspan>
    <tspan class="text" x="1245" dy="28">spatial + temporal</tspan>
    <tspan class="text" x="1245" dy="24">threshold</tspan>
  </text>

  <!-- tiny cluster components visual -->
  <g transform="translate(1118,344)">
    <line class="edge" x1="10" y1="40" x2="56" y2="22"/>
    <line class="edge" x1="56" y1="22" x2="96" y2="42"/>
    <circle class="core" cx="10" cy="40" r="9"/>
    <circle class="core" cx="56" cy="22" r="9"/>
    <circle class="core" cx="96" cy="42" r="9"/>

    <line class="edge" x1="174" y1="42" x2="218" y2="20"/>
    <line class="edge" x1="218" y1="20" x2="262" y2="42"/>
    <line class="edge" x1="174" y1="42" x2="198" y2="68"/>
    <circle class="core" cx="174" cy="42" r="9"/>
    <circle class="core" cx="218" cy="20" r="9"/>
    <circle class="core" cx="262" cy="42" r="9"/>
    <circle class="core" cx="198" cy="68" r="9"/>
  </g>

  <!-- right post-processing pills -->
  <line class="arrow" x1="1366" y1="280" x2="1390" y2="280"/>

  <rect class="green" x="1394" y="194" width="186" height="62" rx="14" ry="14"/>
  <text class="label" x="1487" y="226" text-anchor="middle">
    <tspan x="1487">Attach</tspan>
    <tspan x="1487" dy="24">non-core</tspan>
  </text>

  <rect class="green" x="1394" y="268" width="186" height="62" rx="14" ry="14"/>
  <text class="label" x="1487" y="305" text-anchor="middle">Fix overlaps</text>

  <rect class="green" x="1394" y="342" width="186" height="62" rx="14" ry="14"/>
  <text class="label" x="1487" y="374" text-anchor="middle">
    <tspan x="1487">Discard short</tspan>
    <tspan x="1487" dy="24">stops</tspan>
  </text>

  <!-- split-always mini visual -->
  <rect class="whitebox" x="920" y="430" width="440" height="130" rx="12" ry="12"/>
  <text class="tiny" x="1140" y="456" text-anchor="middle">post-process split_always on core points</text>
  <line class="edge" x1="970" y1="502" x2="1200" y2="502"/>
  <circle class="core" cx="990" cy="502" r="10"/>
  <circle class="core" cx="1032" cy="502" r="10"/>
  <circle class="core" cx="1074" cy="502" r="10"/>
  <circle class="core" cx="1116" cy="502" r="10"/>
  <circle class="core" cx="1158" cy="502" r="10"/>
  <line class="split" x1="1090" y1="470" x2="1090" y2="536"/>
  <line class="split" x1="1144" y1="470" x2="1144" y2="536"/>
  <text class="tiny" x="1090" y="468" text-anchor="middle">CUT</text>
  <text class="tiny" x="1144" y="468" text-anchor="middle">CUT</text>

</svg>
