<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOMAD Stop Dashboard - ECharts</title>

  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #626760;
      --paper: #f6f7f2;
      --panel: #ffffff;
      --line: #d7dbd2;
      --accent: #2f6f73;
      --path: #1f6d6a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 22px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 56px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 760;
      letter-spacing: 0;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    button {
      height: 34px;
      border: 1px solid #bfc6bb;
      border-radius: 6px;
      padding: 0 13px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 680;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .dashboard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(32, 33, 36, 0.08);
    }

    #mapChart {
      width: 100%;
      height: min(70vh, 720px);
      min-height: 460px;
      border-bottom: 1px solid var(--line);
    }

    #timeChart {
      width: 100%;
      height: 126px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--line);
    }

    .stat {
      min-width: 0;
      padding: 12px 14px;
      background: #ffffff;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.25;
    }

    .load-error {
      display: none;
      margin: 16px 0;
      padding: 14px 16px;
      border: 1px solid #d08465;
      border-radius: 8px;
      background: #fff6f0;
      color: #71351f;
    }

    body.echarts-missing .load-error {
      display: block;
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 20px, 1120px);
        padding-top: 12px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      h1 {
        font-size: 21px;
      }

      #mapChart {
        height: 62vh;
        min-height: 390px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

              width: 4,
              opacity: 0.95,
              shadowBlur: 10,
              shadowColor: "rgba(15, 118, 110, 0.26)"
            }
          },
          {
            id: "ghost-pings",
            name: "All pings",
            type: "scatter",
            coordinateSystem: "cartesian2d",
            silent: true,
            z: 3,
            data: DATA.pings.map(pointDatum),
            symbolSize: 5,
            itemStyle: { color: "rgba(31, 35, 38, 0.13)" }
          },
          {
            id: "noise-pings",
            name: "Noise pings",
            type: "scatter",
            coordinateSystem: "cartesian2d",
            z: 5,
            data: [],
            symbolSize: 7,
            itemStyle: { color: "rgba(31, 35, 38, 0.72)" }
          },
          {
            id: "cluster-pings",
            name: "Cluster pings",
            type: "scatter",
            coordinateSystem: "cartesian2d",
            z: 6,
            data: [],
            symbolSize: 12,
            itemStyle: {
              color: (params) => clusterColor(params.data[2]),
              borderColor: "#202124",
              borderWidth: 0.8,
              opacity: 0.95
            }
          },
          {
            id: "detected-stops",
            name: "Detected stops",
            type: "scatter",
            coordinateSystem: "cartesian2d",
            z: 7,
            data: [],
            symbol: "diamond",
            symbolSize: 20,
            itemStyle: {
              color: (params) => clusterColor(params.data[2]),
              borderColor: "#ffffff",
              borderWidth: 2,
              shadowBlur: 8,
              shadowColor: "rgba(32, 33, 36, 0.22)"
            }
          },
          {
            id: "current-ping",
            name: "Current ping",
            type: "effectScatter",
            coordinateSystem: "cartesian2d",
            z: 8,
            data: [],
            symbolSize: 13,
            rippleEffect: { scale: 2.4, brushType: "stroke" },
            itemStyle: {
              color: (params) => clusterColor(params.data[2]),
              borderColor: "#ffffff",
              borderWidth: 1.5
            }
          }
        ]
      });

      timeChart.setOption({
        animation: true,
        animationDurationUpdate: 120,
        grid: { left: 34, right: 22, top: 18, bottom: 28 },
        xAxis: {
          type: "time",
          min: timeMin,
          max: timeMax,
          axisLine: { lineStyle: { color: "#a9aea5" } },
          axisTick: { show: false },
          axisLabel: {
            color: "#626760",
            formatter(value) {
              return new Date(value).toISOString().slice(11, 16);
            }
          },
          splitLine: { show: true, lineStyle: { color: "#edf0ea" } }
        },
        yAxis: {
          min: 0,
          max: 1,
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: { show: false },
          splitLine: { show: false }
        },
        tooltip: { show: false },
        series: [
          {
            id: "ping-ticks",
            type: "custom",
            coordinateSystem: "cartesian2d",
            silent: true,
            z: 1,
            data: DATA.pings.map((_, index) => index),
            renderItem(params, api) {
              const ping = DATA.pings[params.dataIndex];
              const top = api.coord([ping.t * 1000, 0.72]);
              const bottom = api.coord([ping.t * 1000, 0.28]);
              return {
                type: "line",
                shape: { x1: top[0], y1: top[1], x2: bottom[0], y2: bottom[1] },
                style: { stroke: "rgba(32, 33, 36, 0.18)", lineWidth: 1 }
              };
            }
          },
          {
            id: "stop-bars",
            type: "custom",
            coordinateSystem: "cartesian2d",
            z: 2,
            data: [],
            renderItem(params, api) {
              const start = api.coord([api.value(0), 0.24]);
              const end = api.coord([api.value(1), 0.76]);
              const shape = echarts.graphic.clipRectByRect(
                {
                  x: start[0],
                  y: end[1],
                  width: Math.max(2, end[0] - start[0]),
                  height: start[1] - end[1]
                },
                {
                  x: params.coordSys.x,
                  y: params.coordSys.y,
                  width: params.coordSys.width,
                  height: params.coordSys.height
                }
              );
              if (!shape) return null;
              return {
                type: "rect",
                shape,
                style: {
                  fill: clusterColor(api.value(2)),
                  opacity: 0.44
                }
              };
            }
          },
          {
            id: "cursor",
            type: "line",
            coordinateSystem: "cartesian2d",
            showSymbol: false,
            z: 3,
            data: [],
            lineStyle: { color: "#202124", width: 2 }
          }
        ]
      });
    }

    function renderScene(timestampSeconds) {
      currentTimestamp = timestampSeconds;
      const latestPingIndex = latestPingIndexAt(timestampSeconds);
      const current = DATA.pings[latestPingIndex];
      const visible = DATA.pings.filter((point) => point.t <= timestampSeconds);
      const noise = visible.filter((point) => point.cluster < 0).map(pointDatum);
      const clustered = visible.filter((point) => point.cluster >= 0).map(pointDatum);
      const visibleStops = DATA.stops.slice(0, detectedStopCount);
      const route = routeProgressAt(timestampSeconds);

      mapChart.setOption({
        series: [
          {
            id: "completed-paths",
            data: route.completed.map((points) => ({ coords: points }))
          },
          {
            id: "active-path",
            data: route.active
          },
          {
            id: "noise-pings",
            data: noise
          },
          {
            id: "cluster-pings",
            data: clustered
          },
          {
            id: "detected-stops",
            data: visibleStops.map(stopDatum)
          },
          {
            id: "current-ping",
            data: [pointDatum(current)]
          }
        ]
      });

      timeChart.setOption({
        series: [
          {
            id: "stop-bars",
            data: visibleStops.map(stopBarDatum)
          },
          {
            id: "cursor",
            data: [[timestampSeconds * 1000, 0.08], [timestampSeconds * 1000, 0.92]]
          }
        ]
      });

      currentTimeEl.textContent = formatTime(timestampSeconds);
      pingCountEl.textContent = `${visible.length} / ${DATA.pings.length}`;
      stopCountEl.textContent = `${detectedStopCount} / ${DATA.stops.length}`;
    }

    function scheduleNext(delay = 90) {
      clearTimeout(timer);
      if (paused) return;
      timer = setTimeout(advance, delay);
    }

    function advance() {
      if (paused) return;

      sequenceIndex = Math.min(sequenceIndex + 1, timeSequence.length - 1);
      const timestampSeconds = timeSequence[sequenceIndex];
      const previousStopCount = detectedStopCount;
      const nextStopCount = detectedCountFor(timestampSeconds);

      detectedStopCount = nextStopCount;
      renderScene(timestampSeconds);

      if (nextStopCount > previousStopCount) {
        scheduleNext();
        return;
      }

      if (sequenceIndex < timeSequence.length - 1) {
        scheduleNext();
      } else {
        pathEventEl.textContent = "Complete";
        toggleBtn.textContent = "Replay";
        paused = true;
      }
    }

    function replay() {
      clearTimeout(timer);
      paused = false;
      sequenceIndex = 0;
      currentTimestamp = timeSequence[0];
      detectedStopCount = 0;
      toggleBtn.textContent = "Pause";
      pathEventEl.textContent = "Route synced";
      renderScene(currentTimestamp);
      scheduleNext(900);
    }

    toggleBtn.addEventListener("click", () => {
      if (sequenceIndex >= timeSequence.length - 1 && paused) {
        replay();
        return;
      }
      paused = !paused;
      toggleBtn.textContent = paused ? "Play" : "Pause";
      if (!paused) scheduleNext(160);
    });

    replayBtn.addEventListener("click", replay);

    window.addEventListener("resize", () => {
      mapChart.resize();
      timeChart.resize();
    });

    initCharts();
    replay();
  </script>
</body>
</html>
